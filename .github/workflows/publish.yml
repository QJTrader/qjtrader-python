name: Publish to PyPI

# Fires on a version tag (e.g. `v0.4.0`). Also runnable by hand
# (workflow_dispatch) so a release that failed to upload can be retried
# without minting a new tag.
#
# Credential: the repo has a scoped `PYPI_API_TOKEN` secret configured, so the
# publish step authenticates with it (the "Publish (scoped API token)" step
# runs). If that secret is ever removed, the job automatically switches to PyPI
# Trusted Publishing (OIDC) instead — see RELEASING.md for the one-time PyPI +
# GitHub-environment setup that path needs. Exactly one of the two publish
# steps runs, and the "Select PyPI credential mode" step logs which — so a
# future failure shows the mode in the run log at a glance.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Never let two publishes of the same ref race each other.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build
      - name: Check metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for the OIDC Trusted Publishing fallback
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # Secrets can be read in `env:` but not in `if:`, so bridge the token's
      # presence through a step output (this never exposes the value).
      - name: Select PyPI credential mode
        id: mode
        env:
          HAS_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
        run: |
          echo "token=$HAS_TOKEN" >> "$GITHUB_OUTPUT"
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "::notice::Publishing with the scoped PYPI_API_TOKEN repo secret."
          else
            echo "::notice::No PYPI_API_TOKEN set - using OIDC Trusted Publishing."
          fi

      - name: Publish (scoped API token)
        if: steps.mode.outputs.token == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # A file already on PyPI (manual upload racing CI, or a dispatch
          # re-run of a partially-uploaded release) is skipped, not a failure.
          skip-existing: true

      - name: Publish (OIDC Trusted Publishing)
        if: steps.mode.outputs.token == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

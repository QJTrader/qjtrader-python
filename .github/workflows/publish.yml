name: Publish to PyPI

# Fires on a version tag (e.g. `v0.3.1`). Also runnable by hand
# (workflow_dispatch) so a release that failed to upload can be retried
# without minting a new tag.
#
# Auth is resilient by design:
#   * Preferred — PyPI Trusted Publishing (OIDC), no stored secret. Requires the
#     one-time PyPI + GitHub-environment setup in RELEASING.md.
#   * Fallback — if a `PYPI_API_TOKEN` repo secret exists, the publish step uses
#     it. An unset secret expands to an empty string, which the publish action
#     treats as "use OIDC" — so this never blocks Trusted Publishing when it's
#     configured, and unblocks releases when it isn't.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Never let two publishes of the same ref race each other.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build
      - name: Check metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Empty when the secret is unset -> action uses Trusted Publishing.
          password: ${{ secrets.PYPI_API_TOKEN }}
